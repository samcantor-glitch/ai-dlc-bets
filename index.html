  #cursor-glow {

    z-index: 0;

  }
  #root { position: relative; z-index: 1; background: transparent; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }

<script>
  (function () {
    var glow = document.getElementById('cursor-glow');
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return;
    var raf = null;
    window.addEventListener('mousemove', function (e) {
      if (raf) return;
      raf = requestAnimationFrame(function () {
        glow.style.setProperty('--mx', e.clientX + 'px');
        glow.style.setProperty('--my', e.clientY + 'px');
        raf = null;
      });
    }, { passive: true });
  })();
</script>

// === Atoms ============================================================

const Field = ({ label, help, error, htmlFor, children }) => html`
  <div>
    <label class="field-label" for=${htmlFor}>${label}</label>
    ${children}
    ${help && !error && html`<div class="field-help">${help}</div>`}
    ${error && html`<div class="field-err">${error}</div>`}
  </div>
`;

const Input = ({ id, value, onInput, placeholder, invalid }) => html`
  <input
    id=${id}
    class="control"
    type="text"
    value=${value}
    onInput=${onInput}
    placeholder=${placeholder}
    aria-invalid=${invalid ? "true" : "false"}
  />
`;

const Select = ({ id, value, onChange, options, invalid }) => html`
  <select
    id=${id}
    class="control"
    value=${value}
    onChange=${onChange}
    aria-invalid=${invalid ? "true" : "false"}
  >
    ${options.map(o => html`<option key=${o.value} value=${o.value}>${o.label}</option>`)}
  </select>
`;

const Textarea = ({ id, value, onInput, placeholder, rows = 3 }) => html`
  <textarea
    id=${id}
    class="control"
    rows=${rows}
    value=${value}
    onInput=${onInput}
    placeholder=${placeholder}
  ></textarea>
`;

const Button = ({ type = "button", variant = "primary", onClick, disabled, children }) => html`
  <button type=${type} class=${`btn btn-${variant}`} onClick=${onClick} disabled=${disabled}>
    ${children}
  </button>
`;

const Pill = ({ tone = "default", children }) => html`
  <span class="pill" data-tone=${tone}>${children}</span>
`;

// === Molecule =========================================================

const BetCard = ({ bet, count, canAdd, isOpen, onAdd, onRemove, onToggleExpand }) => {
  const picked = count > 0;
  const addDisabled = !canAdd;
  return html`
  <li
    class="card"
    data-picked=${picked ? "true" : "false"}
    data-disabled=${!picked && addDisabled ? "true" : "false"}
  >
    <div
      class=${`flex items-start justify-between gap-4 ${!picked && addDisabled ? "cursor-not-allowed" : "cursor-pointer"}`}
      onClick=${() => canAdd && onAdd()}
      role="button"
      aria-pressed=${picked}
      aria-disabled=${!picked && addDisabled}
    >
      <div class="flex-1">
        <div class="flex items-center gap-3 mb-2">
          <span class="id-chip">${bet.id}</span>
          <span class="t-h4">${bet.name}</span>
        </div>
        <p class="t-bodySm">${bet.desc}</p>
      </div>
      <div class="text-right shrink-0 flex flex-col items-end gap-2">
        <div class="price-num">$${bet.price}</div>
        ${picked
          ? html`
            <div class="stepper" onClick=${(e) => e.stopPropagation()}>
              <button type="button" onClick=${onRemove} aria-label="Remove one unit">−</button>
              <span class="count">${count}</span>
              <button type="button" onClick=${onAdd} disabled=${addDisabled} aria-label="Add one unit">+</button>
            </div>
          `
          : html`
            <${Pill} tone="default">
              ${addDisabled ? "Over budget" : "Tap to pick"}
            <//>
          `}
      </div>
    </div>

    <button
      type="button"
      class="learn-more"
      onClick=${(e) => { e.stopPropagation(); onToggleExpand(); }}
      aria-expanded=${isOpen}
    >
      ${isOpen ? "Hide details" : "Learn more"}
    </button>

    ${isOpen && html`
      <div class="why-block">
        ${bet.summary && html`
          <div style=${{ marginBottom: '20px' }}>
            <div class="micro" style=${{ marginBottom: '8px' }}>The bet</div>
            <p class="t-bodySm">${bet.summary}</p>
          </div>
        `}
        <div>
          <div class="micro" style=${{ marginBottom: '12px' }}>Why this matters to you</div>
          <ul class="space-y-3">
            ${bet.impact.map(im => html`
              <li>
                <div class="t-bodySm" style=${{ color: 'var(--text)', fontWeight: 500 }}>${im.role}</div>
                <div class="t-bodySm">${im.text}</div>
              </li>
            `)}
          </ul>
        </div>
      </div>
    `}
  </li>
`;
};

// === Screen ===========================================================

function AIDLCVote() {
  const [step, setStep] = useState("identify");
  const [name, setName] = useState("");
  const [role, setRole] = useState("");
  const [picks, setPicks] = useState(() => ({})); // { [betId]: count }
  const [expanded, setExpanded] = useState(() => new Set());
  const [note, setNote] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState("");

  const spent = useMemo(
    () => BETS.reduce((s, b) => s + (picks[b.id] || 0) * b.price, 0),
    [picks]
  );
  const remaining = BUDGET - spent;
  const totalUnits = useMemo(
    () => Object.values(picks).reduce((s, c) => s + c, 0),
    [picks]
  );
  const uniqueBets = useMemo(
    () => Object.values(picks).filter(c => c > 0).length,
    [picks]
  );

  function add(bet) {
    if (spent + bet.price > BUDGET) return;
    setPicks({ ...picks, [bet.id]: (picks[bet.id] || 0) + 1 });
  }

  function remove(bet) {
    const current = picks[bet.id] || 0;
    if (current <= 0) return;
    const next = { ...picks };
    if (current === 1) delete next[bet.id]; else next[bet.id] = current - 1;
    setPicks(next);
  }

  function toggleExpand(id) {
    const next = new Set(expanded);
    if (next.has(id)) next.delete(id); else next.add(id);
    setExpanded(next);
  }

  async function submit() {
    setError("");
    if (!name.trim() || !role.trim()) { setError("Add your name and role to submit."); return; }
    if (totalUnits === 0) { setError("Pick at least one bet."); return; }
    setSubmitting(true);
    const payload = {
      voter: name.trim(),
      role: role.trim(),
      picks: BETS
        .filter(b => (picks[b.id] || 0) > 0)
        .map(b => ({ id: b.id, name: b.name, section: b.section, price: b.price, count: picks[b.id], subtotal: picks[b.id] * b.price })),
      spent,
      note: note.trim(),
      submitted_at: new Date().toISOString(),
    };
    try {
      await fetch(ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      setSubmitted(true);
    } catch (e) {
      setError("Couldn't submit. Try again, or screenshot your picks and send them to Sam.");
    } finally {
      setSubmitting(false);
    }
  }

  if (submitted) {
    return html`
      <div class="max-w-2xl mx-auto px-6 py-24">
        <div class="micro" style=${{ marginBottom: '12px' }}>Vote in</div>
        <h1 class="t-h1" style=${{ marginBottom: '24px' }}>Thanks, ${name.split(" ")[0]}.</h1>
        <div class="hair" style=${{ marginBottom: '24px' }}></div>
        <p class="t-body" style=${{ marginBottom: '8px' }}>Your picks are logged. Sam has them.</p>
        <p class="t-bodySm" style=${{ color: 'var(--muted)' }}>You spent $${spent} of $${BUDGET} across ${uniqueBets} bet${uniqueBets === 1 ? "" : "s"} (${totalUnits} unit${totalUnits === 1 ? "" : "s"}).</p>
      </div>
    `;
  }

  let lastSection = null;

  return html`
    <div class="max-w-3xl mx-auto px-6 py-16">
      <header class="mb-8">
        <div class="micro" style=${{ marginBottom: '12px' }}>Engineering, PM & QA only</div>
        <h1 class="t-h1" style=${{ marginBottom: '16px' }}>The AI-DLC Bang for the Buck</h1>
        <p class="t-body" style=${{ maxWidth: '34rem', marginBottom: '12px' }}>
          Not the company-wide vote, this one's just for us: how we plan, point, review,
          and ship software. You have <span class="price-num">$${BUDGET}</span> to spend,
          priced by effort. Whatever wins, we try it.
        </p>
        <p class="t-bodySm" style=${{ maxWidth: '34rem', color: 'var(--muted)' }}>
          Sam will see who voted. How you voted stays between you and him.
        </p>
      </header>

      <div class="hair" style=${{ marginBottom: '32px' }}></div>

      ${step === "identify" && html`
        <section>
          <div class="micro" style=${{ marginBottom: '20px' }}>Who's voting</div>
          <div class="space-y-5" style=${{ marginBottom: '32px' }}>
            <${Field} label="Your name" htmlFor="voter-name">
              <${Input} id="voter-name" value=${name} onInput=${e => setName(e.target.value)} />
            <//>
            <${Field} label="Your role" htmlFor="voter-role">
              <${Select}
                id="voter-role"
                value=${role}
                onChange=${e => setRole(e.target.value)}
                options=${[
                  { value: "", label: "Pick one" },
                  { value: "Engineering", label: "Engineering" },
                  { value: "PM", label: "PM" },
                  { value: "QA", label: "QA" },
                  { value: "EM", label: "Engineering Manager" },
                  { value: "Other", label: "Other" },
                ]}
              />
            <//>
          </div>
          <${Button} onClick=${() => setStep("vote")} disabled=${!name.trim() || !role.trim()}>
            Start voting
          <//>
        </section>
      `}

      ${step === "vote" && html`
        <section>
          <div class="sticky-bar -mx-6 px-6 py-4 mb-6 flex items-baseline justify-between">
            <div>
              <div class="micro" style=${{ marginBottom: '4px' }}>Remaining</div>
              <div class="price-num-lg">$${remaining}</div>
            </div>
            <div class="t-bodySm" style=${{ color: 'var(--muted)' }}>
              ${uniqueBets} bet${uniqueBets === 1 ? "" : "s"} · ${totalUnits} unit${totalUnits === 1 ? "" : "s"} · $${spent} spent
            </div>
          </div>

          <p class="t-bodySm" style=${{ color: 'var(--muted)', marginBottom: '16px' }}>
            Tip: you can double down. Tap a bet twice to put two units on it, three times for three, and so on.
          </p>

          <ul class="space-y-3" style=${{ marginBottom: '32px' }}>
            ${BETS.map(b => {
              const header = b.section !== lastSection;
              lastSection = b.section;
              return html`
                ${header && html`<li class="section-head" key=${`h-${b.section}`}>${b.section}</li>`}
                <${BetCard}
                  key=${b.id}
                  bet=${b}
                  count=${picks[b.id] || 0}
                  canAdd=${b.price <= remaining}
                  isOpen=${expanded.has(b.id)}
                  onAdd=${() => add(b)}
                  onRemove=${() => remove(b)}
                  onToggleExpand=${() => toggleExpand(b.id)}
                />
              `;
            })}
          </ul>

          <div style=${{ marginBottom: '24px' }}>
            <${Field}
              label="Anything to add"
              help="Why these bets, what's missing, what you'd push back on. Optional."
              htmlFor="voter-note"
            >
              <${Textarea}
                id="voter-note"
                value=${note}
                onInput=${e => setNote(e.target.value)}
                rows=${3}
              />
            <//>
          </div>

          ${error && html`<div class="field-err" style=${{ marginBottom: '16px' }}>${error}</div>`}

          <div class="flex items-center gap-2">
            <${Button} onClick=${submit} disabled=${submitting || totalUnits === 0}>
              ${submitting ? "Submitting…" : "Submit vote"}
            <//>
            <${Button} variant="tertiary" onClick=${() => setStep("identify")}>
              Back
            <//>
          </div>
        </section>
      `}

      <footer style=${{ marginTop: '80px', paddingTop: '24px', borderTop: '1px solid var(--hair)' }}>
        <div class="t-caption">The AI-DLC Bang for the Buck · Engineering, PM & QA only · One vote per person.</div>
      </footer>
    </div>
  `;
}

render(html`<${AIDLCVote} />`, document.getElementById('root'));
</script>
</body>
</html>
